apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgresql
spec:
  selector:
    matchLabels:
      app: postgresql
  template:
    metadata:
      labels:
        app: postgresql
    spec:
      containers:
      - name: postgresql
        image: postgres:16 # Pinned to version 16. Deployment fails for latest tag version.
        env:
        - name: POSTGRES_DB
          value: udacity_db
        - name: POSTGRES_USER
          value: udacity
        - name: POSTGRES_PASSWORD
          value: ${DB_PASSWORD}
        ports:
        - containerPort: 5432
        volumeMounts:
        - mountPath: /var/lib/postgresql/data
          name: postgresql-storage
      volumes:
      - name: postgresql-storage
        persistentVolumeClaim:
          claimName: postgresql-pvc