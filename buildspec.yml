version: 0.2

phases:
  pre_build:
    commands:
      - echo Logging into ECR
      - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com
  build:
    commands:
      - echo Starting build at `date`
      - echo Building the Docker image...
      - pushd ./analytics
      - docker build --platform linux/arm64 -t $IMAGE_REPO_NAME:$CODEBUILD_BUILD_NUMBER-arm64 .
      - docker tag $IMAGE_REPO_NAME:$CODEBUILD_BUILD_NUMBER-arm64 $AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com/$IMAGE_REPO_NAME:0.0.$CODEBUILD_BUILD_NUMBER-arm64
  post_build:
    commands:
      - echo Completed build at `date`
      - echo Pushing the Docker image...
      - docker push $AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com/$IMAGE_REPO_NAME:0.0.$CODEBUILD_BUILD_NUMBER-arm64